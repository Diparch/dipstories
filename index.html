<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DipStories by Dimitra Peppa</title>
  <meta name="description" content="DipStories by Dimitra Peppa — photography, graphic design, landscape architecture, and research." />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --hero-text: #f4efe8;
      --hero-muted: rgba(244, 239, 232, 0.82);
      --hero-soft: rgba(244, 239, 232, 0.58);
      --path-stroke: rgba(244, 239, 232, 0.34);
      --path-stroke-soft: rgba(244, 239, 232, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Satoshi", Arial, sans-serif;
      background: #111;
      color: var(--hero-text);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .hero {
      min-height: 100vh;
      position: relative;
      display: flex;
      align-items: flex-end;
      background:
        linear-gradient(to top, rgba(8, 8, 8, 0.88) 8%, rgba(8, 8, 8, 0.32) 44%, rgba(8, 8, 8, 0.10) 100%),
        linear-gradient(to right, rgba(0, 0, 0, 0.22), rgba(0, 0, 0, 0.04) 50%, rgba(0, 0, 0, 0.16)),
        url("DSC_0727.jpg") center center / cover no-repeat;
      overflow: hidden;
    }

    .hero-inner {
      width: min(1220px, 92%);
      margin: 0 auto;
      padding: 0 0 3.3rem;
      position: relative;
      z-index: 2;
    }

    .name {
      margin: 0;
      font-size: clamp(1.65rem, 4.6vw, 4.9rem);
      line-height: 0.95;
      letter-spacing: -0.05em;
      font-weight: 500;
      color: var(--hero-text);
      white-space: nowrap;
    }

    .intro {
      margin-top: 1.15rem;
      max-width: 31rem;
      font-size: clamp(1rem, 1.45vw, 1.08rem);
      line-height: 1.7;
      color: var(--hero-muted);
      font-weight: 400;
    }

    .path-zone {
      position: relative;
      margin-top: 2.4rem;
      width: 100%;
    }

    .path-svg {
      width: 100%;
      height: 72px;
      display: block;
      overflow: visible;
    }

    .path-svg .main-line {
      stroke: var(--path-stroke);
      stroke-width: 1.4;
      stroke-linecap: round;
    }

    .path-svg .echo-line {
      stroke: var(--path-stroke-soft);
      stroke-width: 1;
      stroke-linecap: round;
    }

    .menu-line {
      position: absolute;
      left: 0;
      right: 0;
      top: 18px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.45rem;
      font-size: clamp(0.95rem, 1.5vw, 1.04rem);
      line-height: 1.6;
      color: var(--hero-text);
    }

    .menu-line a {
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s ease, opacity 0.2s ease;
    }

    .menu-line a:hover {
      border-bottom-color: rgba(244, 239, 232, 0.62);
      opacity: 1;
    }

    .menu-line .sep {
      color: var(--hero-soft);
    }

    .menu-line .cta {
      font-weight: 500;
    }

    @media (max-width: 900px) {
      .name {
        font-size: clamp(1.35rem, 5.2vw, 3.2rem);
      }

      .intro {
        max-width: 27rem;
      }
    }

    @media (max-width: 640px) {
      .hero-inner {
        width: min(92%, 100%);
        padding-bottom: 2.5rem;
      }

      .name {
        font-size: clamp(1.05rem, 5vw, 2rem);
      }

      .path-zone {
        margin-top: 2rem;
      }

      .path-svg {
        height: 60px;
      }

      .menu-line {
        top: 12px;
        gap: 0.35rem;
        font-size: 0.94rem;
        line-height: 1.9;
      }
    }
  </style>
</head>
<body>
  <main class="hero">
    <div class="hero-inner">
      <h1 class="name">DipStories by Dimitra Peppa</h1>

      <p class="intro">
        A multidisciplinary practice moving through photography, graphic design,
        landscape architecture, and research.
      </p>

      <div class="path-zone">
        <svg class="path-svg" viewBox="0 0 1200 72" preserveAspectRatio="none" aria-hidden="true">
          <line class="main-line" x1="0" y1="34" x2="1200" y2="34"></line>
          <line class="echo-line" x1="0" y1="42" x2="1200" y2="42"></line>
        </svg>

        <nav class="menu-line" aria-label="Main navigation">
          <a href="about.html">About</a>
          <span class="sep">|</span>
          <a href="services.html">Services</a>
          <span class="sep">|</span>
          <a href="work.html">Selected Work</a>
          <span class="sep">→</span>
          <a class="cta" href="contact.html">Write to me</a>
        </nav>
      </div>
    </div>
  </main>
</body>
</html>
