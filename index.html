<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DipStories</title>
  <meta name="description" content="DipStories — photography, graphic design, landscape architecture, and research." />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --hero-text: #f4efe8;
      --hero-muted: rgba(244, 239, 232, 0.82);
      --hero-soft: rgba(244, 239, 232, 0.62);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Satoshi", Arial, sans-serif;
      background: #111;
      color: var(--hero-text);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .hero {
      min-height: 100vh;
      position: relative;
      display: flex;
      align-items: flex-end;
      background:
        linear-gradient(to top, rgba(8, 8, 8, 0.88) 8%, rgba(8, 8, 8, 0.32) 44%, rgba(8, 8, 8, 0.10) 100%),
        linear-gradient(to right, rgba(0, 0, 0, 0.22), rgba(0, 0, 0, 0.04) 50%, rgba(0, 0, 0, 0.16)),
        url("DSC_0727.jpg") center center / cover no-repeat;
    }

    .hero-inner {
      width: min(1100px, 90%);
      margin: 0 auto;
      padding: 0 0 3.5rem;
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 3rem;
      align-items: end;
    }

    .left {
      max-width: 40rem;
    }

    .name {
      font-size: 0.78rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--hero-soft);
      margin-bottom: 1rem;
      font-weight: 500;
    }

    h1 {
      margin: 0;
      font-size: clamp(3rem, 6.5vw, 6.2rem);
      line-height: 0.92;
      letter-spacing: -0.05em;
      font-weight: 500;
      max-width: 8ch;
    }

    .intro {
      margin-top: 1.25rem;
      max-width: 31rem;
      font-size: 1.02rem;
      line-height: 1.7;
      color: var(--hero-muted);
      font-weight: 400;
    }

    .right {
      justify-self: end;
      width: min(100%, 320px);
      padding-bottom: 0.25rem;
    }

    .menu-label {
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--hero-soft);
      margin-bottom: 1rem;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }

    .menu a {
      width: fit-content;
      color: var(--hero-text);
      font-size: 1rem;
      line-height: 1.5;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s ease, transform 0.2s ease;
    }

    .menu a:hover {
      border-bottom-color: rgba(244, 239, 232, 0.6);
      transform: translateX(4px);
    }

    .menu a span {
      color: var(--hero-soft);
      margin-right: 0.6rem;
    }

    @media (max-width: 900px) {
      .hero-inner {
        grid-template-columns: 1fr;
        gap: 2.2rem;
      }

      .right {
        justify-self: start;
        width: 100%;
      }

      h1 {
        font-size: clamp(2.5rem, 11vw, 4.6rem);
      }

      .intro {
        max-width: 28rem;
        font-size: 1rem;
      }
    }

    @media (max-width: 640px) {
      .hero-inner {
        padding-bottom: 2.6rem;
      }

      .menu {
        gap: 0.55rem;
      }

      .menu a {
        font-size: 0.98rem;
      }
    }
  </style>
</head>
<body>
  <main class="hero">
    <div class="hero-inner">
      <div class="left">
        <div class="name">DipStories</div>
        <h1>Multidisciplinary approach to your creative needs</h1>
        <p class="intro">
          Photography, graphic design, landscape architecture, and research shaped through
          atmosphere, story, and stillness.
        </p>
      </div>

      <nav class="right" aria-label="Main navigation">
        <div class="menu-label">Enter</div>
        <div class="menu">
          <a href="about.html"><span>01</span>About</a>
          <a href="services.html"><span>02</span>Services</a>
          <a href="work.html"><span>03</span>Selected Work</a>
          <a href="contact.html"><span>04</span>Write to me</a>
        </div>
      </nav>
    </div>
  </main>
</body>
</html>
