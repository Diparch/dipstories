<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — DipStories by Dimitra Peppa</title>
  <meta name="description" content="Contact DipStories by Dimitra Peppa." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Just+Another+Hand&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #12100f;
      --text: #f4efe8;
      --muted: rgba(244,239,232,0.76);
      --soft: rgba(244,239,232,0.54);
      --line: rgba(244,239,232,0.26);
      --card: rgba(255,255,255,0.04);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: "Satoshi", Arial, sans-serif;
      background:
        linear-gradient(180deg, rgba(15,14,13,0.78) 0%, rgba(20,18,16,0.96) 100%),
        url("DSC_0727.jpg") center center / cover no-repeat fixed;
      color: var(--text);
    }

    a { color: inherit; text-decoration: none; }

    .wrap {
      width: min(1180px, 92%);
      margin: 0 auto;
      padding: 2rem 0 4rem;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
      white-space: nowrap;
    }

    .brand-main {
      font-family: "Just Another Hand", cursive;
      font-size: clamp(2.4rem, 5vw, 4.8rem);
      line-height: 0.9;
    }

    .brand-sub {
      font-size: clamp(0.82rem, 1.2vw, 1.05rem);
      color: var(--muted);
    }

    .nav {
      font-size: 0.96rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 0.45rem;
      margin-top: 0.8rem;
    }

    .nav a:hover { text-decoration: underline; text-underline-offset: 0.2em; }
    .sep { color: var(--soft); }

    .path-zone {
      margin-top: 1rem;
      height: 58px;
    }

    .path-zone svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .path-zone path {
      fill: none;
      stroke: var(--line);
      stroke-width: 1.2;
      stroke-linecap: round;
    }

    .content {
      margin-top: 2.6rem;
      display: grid;
      grid-template-columns: 1fr 0.95fr;
      gap: 2rem;
      align-items: start;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4.4rem);
      line-height: 0.96;
      letter-spacing: -0.04em;
      font-weight: 500;
      max-width: 8ch;
    }

    .lead {
      margin-top: 1rem;
      color: var(--muted);
      line-height: 1.75;
      font-size: 1.02rem;
      max-width: 32rem;
    }

    .contact-block {
      margin-top: 1.5rem;
      color: var(--muted);
      line-height: 1.8;
    }

    .contact-block a {
      color: var(--text);
      border-bottom: 1px solid rgba(244,239,232,0.34);
    }

    .form {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 1.3rem;
      backdrop-filter: blur(8px);
    }

    .field {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      margin-bottom: 0.45rem;
      font-size: 0.88rem;
      color: var(--soft);
    }

    input, textarea {
      width: 100%;
      padding: 0.9rem 0;
      border: 0;
      border-bottom: 1px solid rgba(255,255,255,0.18);
      background: transparent;
      color: var(--text);
      font: inherit;
      outline: none;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    button {
      margin-top: 0.6rem;
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--text);
      font: inherit;
      cursor: pointer;
      border-bottom: 1px solid rgba(244,239,232,0.38);
    }

    @media (max-width: 860px) {
      .topbar { flex-direction: column; }
      .nav { justify-content: flex-start; }
      .content { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="topbar">
      <a class="brand" href="index.html">
        <span class="brand-main">DipStories</span>
        <span class="brand-sub">by Dimitra Peppa</span>
      </a>

      <nav class="nav" aria-label="Main navigation">
        <a href="about.html">About</a>
        <span class="sep">|</span>
        <a href="services.html">Services</a>
        <span class="sep">|</span>
        <a href="work.html">Selected Work</a>
        <span class="sep">→</span>
        <a href="contact.html">Write to me</a>
      </nav>
    </div>

    <div class="path-zone" aria-hidden="true">
      <svg viewBox="0 0 1200 58" preserveAspectRatio="none">
        <path d="M0,39 C150,50 300,18 470,18 L820,18 C980,18 1080,30 1200,21" />
      </svg>
    </div>

    <section class="content">
      <div>
        <h1>Write to me</h1>
        <p class="lead">
          For collaborations, commissions, design work, photography, or research-related
          inquiries, you can reach out here.
        </p>

        <div class="contact-block">
          <div>Email: <a href="mailto:hello@example.com">hello@example.com</a></div>
          <div><a href="https://www.instagram.com/_dipstories_/" target="_blank" rel="noopener noreferrer">Instagram</a></div>
        </div>
      </div>

      <form class="form">
        <div class="field">
          <label for="name">Name</label>
          <input id="name" type="text" name="name">
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" name="email">
        </div>

        <div class="field">
          <label for="message">Message</label>
          <textarea id="message" name="message"></textarea>
        </div>

        <button type="submit">Send message</button>
      </form>
    </section>
  </main>
</body>
</html>
