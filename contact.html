<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — DipStories</title>
  <meta name="description" content="Contact DipStories." />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #e9e2d7;
      --text: #2b241e;
      --muted: #6f6458;
      --line: rgba(60, 48, 38, 0.14);
      --link: #6d5439;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Satoshi", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }
    .container {
      width: min(960px, 90%);
      margin: 0 auto;
    }
    header {
      padding: 2rem 0 3rem;
      border-bottom: 1px solid var(--line);
    }
    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      font-size: 0.92rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    nav a {
      color: var(--muted);
      text-decoration: none;
    }
    nav a:hover, nav a.active {
      color: var(--text);
      text-decoration: underline;
    }
    h1 {
      font-size: clamp(2.4rem, 6vw, 4.6rem);
      line-height: 0.95;
      margin: 2.5rem 0 1rem;
      letter-spacing: -0.04em;
      max-width: 10ch;
    }
    .lead {
      max-width: 42rem;
      color: var(--muted);
      font-size: 1.1rem;
    }
    main {
      padding: 4rem 0 5rem;
    }
    .contact-block {
      max-width: 42rem;
    }
    .contact-block p {
      margin: 0 0 1.2rem;
      color: var(--muted);
    }
    .email-link {
      font-size: 1.2rem;
      color: var(--link);
      text-decoration: none;
    }
    .email-link:hover {
      text-decoration: underline;
    }
    footer {
      padding: 1rem 0 3rem;
      color: var(--muted);
      border-top: 1px solid var(--line);
      font-size: 0.92rem;
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="work.html">Selected Work</a>
        <a href="contact.html" class="active">Contact</a>
      </nav>
      <h1>Contact</h1>
      <p class="lead">
        For collaborations, commissions, or inquiries, feel free to get in touch.
      </p>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="contact-block">
        <p>You can reach me directly at:</p>
        <p>
          <a class="email-link" href="mailto:dipeppa@outlook.com">dipeppa@outlook.com</a>
        </p>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">DipStories © 2026</div>
  </footer>
</body>
</html>
